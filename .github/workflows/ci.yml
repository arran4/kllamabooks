# Agent rules for generation:
# https://arran4.github.io/blog/post/2026/006-github-ci-and-deploy/
# Built using this post as a reference/guide.
name: CI/CD

on:
  push:
    branches: [main, master]
    # semantic version tags + rc/beta snapshots
    tags:
      - 'v*'
      - 'v*.*.*'
      - 'v*.*.*-rc*'
      - 'v*.*.*-beta*'
      - 'test-*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "lint-fix"
        type: choice
        options:
          - lint-fix
          - build
          - release-major
          - release-minor
          - release-patch
          - release-test
          - release-rc
          - release-alpha
          - monthly-maintenance
      release_version_override:
        description: "Optional explicit release version (for example 2.4.0 or 2.4.0-rc.2)"
        required: false
        default: ""
        type: string
      allow_prs:
        description: "Allow automation to open pull requests"
        required: false
        default: true
        type: boolean
  schedule:
    # preferred heavy monthly run (quota reset strategy)
    - cron: '17 3 1 * *'
    # optional nightly lightweight checks
    - cron: '41 2 * * *'

concurrency:
  # Keep this as a safety net, not the primary dedupe mechanism.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  discussions: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write

jobs:
  route:
    name: Route event
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.route.outputs.run_code_checks }}
      run_pr_meta_checks: ${{ steps.route.outputs.run_pr_meta_checks }}
      run_cleanup: ${{ steps.route.outputs.run_cleanup }}
      run_release: ${{ steps.route.outputs.run_release }}
      is_monthly: ${{ steps.route.outputs.is_monthly }}
      is_nightly: ${{ steps.route.outputs.is_nightly }}
    steps:
      - id: route
        shell: bash
        run: |
          set -euo pipefail

          run_code_checks=false
          run_pr_meta_checks=false
          run_cleanup=false
          run_release=false
          is_monthly=false
          is_nightly=false

          case "${{ github.event_name }}" in
            push)
              run_code_checks=true
              ;;
            pull_request)
              if [[ "${{ github.event.action }}" == "closed" ]]; then
                run_cleanup=true
              else
                run_pr_meta_checks=true
                # In practice, also run code checks on PRs so lint/fmt/vet/test
                # show up directly in the PR UI. Use concurrency to collapse churn.
                run_code_checks=true
              fi
              ;;
            release)
              run_release=true
              ;;
            workflow_dispatch)
              run_code_checks=true
              if [[ "${{ inputs.mode }}" == release-* ]]; then
                run_release=true
              fi
              if [[ "${{ inputs.mode }}" == "monthly-maintenance" ]]; then
                is_monthly=true
              fi
              if [[ "${{ inputs.mode }}" == "lint-fix" ]]; then
                # Manual lint-fix acts as an on-demand nightly-style maintenance pass.
                is_nightly=true
              fi
              ;;
            schedule)
              run_code_checks=true
              if [[ "${{ github.event.schedule }}" == "17 3 1 * *" ]]; then
                is_monthly=true
              fi
              if [[ "${{ github.event.schedule }}" == "41 2 * * *" ]]; then
                is_nightly=true
              fi
              ;;
          esac

          echo "run_code_checks=$run_code_checks" >> "$GITHUB_OUTPUT"
          echo "run_pr_meta_checks=$run_pr_meta_checks" >> "$GITHUB_OUTPUT"
          echo "run_cleanup=$run_cleanup" >> "$GITHUB_OUTPUT"
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"
          echo "is_monthly=$is_monthly" >> "$GITHUB_OUTPUT"
          echo "is_nightly=$is_nightly" >> "$GITHUB_OUTPUT"

  discover:
    name: Discover capabilities and cost profile
    needs: route
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.profile }}
      has_go: ${{ steps.detect.outputs.has_go }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_dart: ${{ steps.detect.outputs.has_dart }}
      has_flutter: ${{ steps.detect.outputs.has_flutter }}
      has_qt_cpp: ${{ steps.detect.outputs.has_qt_cpp }}
      has_make_c: ${{ steps.detect.outputs.has_make_c }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
      has_goreleaser: ${{ steps.detect.outputs.has_goreleaser }}
      has_dart_or_flutter_tests: ${{ steps.detect.outputs.has_dart_or_flutter_tests }}
      has_packaging: ${{ steps.detect.outputs.has_packaging }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          echo "has_go=false" >> "$GITHUB_OUTPUT"
          echo "has_node=false" >> "$GITHUB_OUTPUT"
          echo "has_dart=false" >> "$GITHUB_OUTPUT"
          echo "has_flutter=false" >> "$GITHUB_OUTPUT"
          echo "has_qt_cpp=true" >> "$GITHUB_OUTPUT"
          echo "has_make_c=false" >> "$GITHUB_OUTPUT"
          echo "has_docker=false" >> "$GITHUB_OUTPUT"
          echo "has_goreleaser=false" >> "$GITHUB_OUTPUT"
          echo "has_dart_or_flutter_tests=false" >> "$GITHUB_OUTPUT"
          echo "has_packaging=true" >> "$GITHUB_OUTPUT"

      - id: profile
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event.repository.private }}" == "true" ]]; then
            echo "profile=private" >> "$GITHUB_OUTPUT"
          else
            echo "profile=public" >> "$GITHUB_OUTPUT"
          fi

  prepare-release-tag:
    name: Prepare release tag
    needs: [route]
    if: ${{ github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-') }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      next_version: ${{ steps.tag.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup git-tag-inc
        uses: arran4/git-tag-inc-action@v1
        with:
          mode: install
      # Do not also run `go install github.com/arran4/git-tag-inc/...` in this job.
      # Using both is redundant and has caused avoidable CI drift.
      - id: tag
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          MODE="${{ inputs.mode }}"
          OVERRIDE="${{ inputs.release_version_override }}"

          if [[ -n "$OVERRIDE" ]]; then
            # Accept "1.2.3" or "v1.2.3" override input.
            OVERRIDE="${OVERRIDE#v}"
            next_tag="v$OVERRIDE"
          else
            case "$MODE" in
              release-major) level="major"; suffix="" ;;
              release-minor) level="minor"; suffix="" ;;
              release-patch) level="patch"; suffix="" ;;
              release-test)  level="patch"; suffix="test" ;;
              release-rc)    level="patch"; suffix="rc" ;;
              release-alpha) level="patch"; suffix="alpha" ;;
              *) echo "Unsupported release mode: $MODE"; exit 1 ;;
            esac
            if command -v git-tag-inc >/dev/null 2>&1; then
              # git-tag-inc uses positional commands (patch/major/minor/test/rc...)
              # and NOT flag forms like -patch.
              level="${level#-}"
              args=(-print-version-only "$level")
              [[ -n "$suffix" ]] && args+=("$suffix")
              next_tag=$(git-tag-inc "${args[@]}")
            else
              # Fallback implementation when git-tag-inc is not available.
              git fetch --tags --force
              latest=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n 1)
              [[ -z "$latest" ]] && latest='0.0.0'

              # Prefer npx semver if available (same pattern used in g2 fixes).
              if command -v npx >/dev/null 2>&1; then
                case "$level" in
                  major) bumped=$(npx --yes semver "$latest" -i major) ;;
                  minor) bumped=$(npx --yes semver "$latest" -i minor) ;;
                  *) bumped=$(npx --yes semver "$latest" -i patch) ;;
                esac
                next_tag="v${bumped}"
              else
                base="${latest%%-*}"
                IFS='.' read -r maj min pat <<< "$base"
                case "$level" in
                  major) maj=$((maj+1)); min=0; pat=0 ;;
                  minor) min=$((min+1)); pat=0 ;;
                  *) pat=$((pat+1)) ;;
                esac
                next_tag="v${maj}.${min}.${pat}"
              fi

              if [[ -n "$suffix" ]]; then
                next_tag="${next_tag}-${suffix}.1"
              fi
            fi
          fi

          # Tagging safety guards to avoid duplicate/invalid release states.
          [[ "$next_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]] || {
            echo "Invalid tag format: $next_tag" >&2
            exit 1
          }
          git fetch --tags --force
          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $next_tag" >&2
            echo "Choose a new mode or set release_version_override." >&2
            exit 1
          fi

          echo "release_tag=$next_tag" >> "$GITHUB_OUTPUT"
          clean_tag="${next_tag#v}"; clean_tag="${clean_tag%%-*}"
          IFS='.' read -r maj min pat <<< "$clean_tag"
          echo "next_version=${maj:-0}.${min:-0}.$(( ${pat:-0} + 1 ))-SNAPSHOT" >> "$GITHUB_OUTPUT"

  flatpak-build:
    name: Flatpak package
    needs: [route, discover]
    if: ${{ needs.route.outputs.run_release == 'true' && needs.discover.outputs.has_qt_cpp == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y flatpak flatpak-builder
      - name: Add Flathub Remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --user --force-clean --install-deps-from=flathub build-dir packaging/flatpak/com.arran4.kllamabooks.yaml
          flatpak build-bundle repo kllamabooks.flatpak com.arran4.kllamabooks

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          retention-days: 1
          path: kllamabooks.flatpak

  cpp-qt-build-test:
    name: Qt/C++ build
    needs: [route, discover]
    if: ${{ needs.discover.outputs.has_qt_cpp == 'true' && needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: debian:testing
    steps:
      - name: Pre-install core tools for container
        run: |
          apt-get update
          apt-get install -y git sudo curl jq
          git config --global --add safe.directory /__w/kllamabooks/kllamabooks
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y cmake ninja-build build-essential qt6-base-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools libkf6wallet-dev libkf6notifications-dev libkf6coreaddons-dev libkf6xmlgui-dev libkf6configwidgets-dev libkf6i18n-dev clang-format cppcheck pkg-config libsqlcipher-dev
      - name: Lint style and static checks
        run: |
          find src \( -name '*.cpp' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' \) -print0 | xargs -0 -r clang-format --dry-run --Werror || true
          cppcheck --enable=warning,style,performance,portability --suppress=missingIncludeSystem --suppress=missingInclude --suppress=unusedFunction --suppress=constVariablePointer --suppress=unknownMacro --error-exitcode=1 src/
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --parallel
      - run: QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure

      - name: Verify Binary
        run: |
          if [ -f build/kllamabooks ]; then
            echo "Binary built successfully"
          else
            echo "Binary not found"
            exit
            1
          fi

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-ubuntu-latest
          retention-days: 1
          path: build/kllamabooks

  autofix:
    name: Auto-format and open PR
    needs: [route, discover]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'lint-fix' && inputs.allow_prs == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lint Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Run clang-format
        run: |
          find src -name "*.cpp" -o -name "*.h" | xargs clang-format -i -style=file || true
      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes; exiting."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PARENT_PR="${{ github.event.pull_request.number || 'none' }}"
          BRANCH="ci/autofix/${{ github.run_id }}-parent-${PARENT_PR}"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: auto-linting"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix: auto-linting" \
            --body "Automated lint fixes triggered by workflow_dispatch. Parent-PR: ${PARENT_PR}" \
            --base main \
            --head "$BRANCH" \
            --label "ci-autofix"

  cleanup-autofix-prs:
    name: Cleanup autofix PRs on parent close
    needs: [route]
    if: ${{ needs.route.outputs.run_cleanup == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr list --state open --search "label:ci-autofix in:title" --json number,headRefName,body | \
            jq -r '.[] | select(.body | contains("Parent-PR: '"$PARENT_PR"'")) | [.number, .headRefName] | @tsv' | \
            while IFS=$'\t' read -r pr branch; do
              gh pr close "$pr" --comment "Closing auto-fix PR because parent PR #$PARENT_PR was closed."
              git push origin --delete "$branch" || true
            done

  manual-gh-release:
    name: Manual release creation
    needs: [prepare-release-tag]
    if: ${{ github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update CMake version for release
        run: |
          set -euo pipefail
          CMAKE_VERSION=$(grep -Po 'project\(kllamabooks VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          RELEASE_TAG="${{ needs.prepare-release-tag.outputs.release_tag }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          if [[ "$CMAKE_VERSION" != "$RELEASE_VERSION" ]]; then
            sed -i "s/project(kllamabooks VERSION $CMAKE_VERSION)/project(kllamabooks VERSION $RELEASE_VERSION)/" CMakeLists.txt
            git add CMakeLists.txt
            git commit -m "chore: bump version to $RELEASE_VERSION for release" || true
          fi

      - name: Push prepared tag (retry)
        env:
          TAG: ${{ needs.prepare-release-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          git tag "$TAG"

          git push origin "$TAG" || { sleep 2; git push origin "$TAG"; }

      - name: Create PR for next version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ needs.prepare-release-tag.outputs.next_version }}"
          RELEASE_TAG="${{ needs.prepare-release-tag.outputs.release_tag }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if [[ -n "$NEXT_VERSION" ]]; then
            NEXT_VERSION="${NEXT_VERSION%%-SNAPSHOT*}"
            if [[ "$RELEASE_VERSION" != "$NEXT_VERSION" ]]; then
              sed -i "s/project(kllamabooks VERSION $RELEASE_VERSION)/project(kllamabooks VERSION $NEXT_VERSION)/" CMakeLists.txt
              git add CMakeLists.txt

              BRANCH="ci/bump-version-${NEXT_VERSION}"
              git checkout -b "$BRANCH"
              git commit -m "chore: bump version to $NEXT_VERSION" || true

              git push origin "$BRANCH" || { sleep 2; git push origin "$BRANCH"; }

              gh pr create \
                --title "chore: bump version to $NEXT_VERSION" \
                --body "Automated version bump for next development cycle after $RELEASE_TAG release." \
                --base main \
                --head "$BRANCH" || true
            fi
          fi

      - name: Create release with generated notes + discussion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release-tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          prerelease=""
          case "${{ inputs.mode }}" in
            release-test|release-rc|release-alpha) prerelease="--prerelease" ;;
          esac

          discussion_arg="--discussion-category Announcements"

          # Permissions/discussions can block discussion linking in some repos.
          # Fall back to plain release creation if category linking fails.
          if [[ -n "$prerelease" ]]; then
            gh release create "$TAG" --generate-notes $prerelease || true
          else
            gh release create "$TAG" --generate-notes $discussion_arg || \
              gh release create "$TAG" --generate-notes
          fi

  publish-draft:
    name: Publish draft release assets
    needs: [route, discover, cpp-qt-build-test, flatpak-build]
    if: ${{ !failure() && !cancelled() && needs.route.outputs.run_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-ubuntu-latest
          path: dist-release/build
      - name: Rename binary
        run: |
          mv dist-release/build/kllamabooks dist-release/build/kllamabooks-ubuntu-latest-amd64
      - name: Collect flatpak bundle
        uses: actions/download-artifact@v4
        if: ${{ needs.discover.outputs.has_qt_cpp == 'true' }}
        continue-on-error: true
        with:
          name: flatpak-bundle
          path: dist-release/build
      - name: Publish draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist-release/build/kllamabooks-ubuntu-latest-amd64
            dist-release/build/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote-release:
    name: Promote draft to published
    needs: [publish-draft]
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Release promoted via upstream process
        run: echo "Promotion step placeholder (gh api patch release draft=false)"

  update-ebuild:
    name: Update Ebuild in arrans_overlay
    needs: [route, cpp-qt-build-test]
    if: ${{ needs.route.outputs.run_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for token
        id: check_token
        env:
          OVERLAY_TOKEN: ${{ secrets.OVERLAY_GITHUB_TOKEN }}
        run: |
          if [ -n "$OVERLAY_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout arrans_overlay
        if: steps.check_token.outputs.has_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: arran4/arrans_overlay
          path: arrans_overlay
          token: ${{ secrets.OVERLAY_GITHUB_TOKEN }}

      - name: Set up Git
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          cd arrans_overlay
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install required tools
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq coreutils
          url="$(curl -s --header "Accept: application/vnd.github+json" --header "Authorization: Bearer ${{secrets.GITHUB_TOKEN}}" https://api.github.com/repos/arran4/g2/releases/latest | jq -r '.assets[].browser_download_url | select(endswith("_linux_amd64.deb"))')"
          wget "${url}" -O /tmp/g2.deb
          sudo dpkg -i /tmp/g2.deb
          rm /tmp/g2.deb

      - name: Update ebuild and manifest
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          cd arrans_overlay
          # Extract version from tag
          VERSION="${GITHUB_REF#refs/tags/v}"

          # Find the latest ebuild
          EBUILD_DIR="dev-vcs/kllamabooks"
          LATEST_EBUILD=$(ls -1 $EBUILD_DIR/*.ebuild | sort -V | tail -n 1)
          NEW_EBUILD="$EBUILD_DIR/kllamabooks-${VERSION}.ebuild"

          if [ -f "$NEW_EBUILD" ]; then
            echo "Ebuild for version ${VERSION} already exists. Skipping."
          else
            # Copy to new version
            cp "$LATEST_EBUILD" "$NEW_EBUILD"

            # Generate Manifest
            g2 manifest upsert-from-url "https://github.com/arran4/kllamabooks/archive/refs/tags/v${VERSION}.tar.gz" "kllamabooks-${VERSION}.tar.gz" "$EBUILD_DIR/Manifest"
          fi

      - name: Create Pull Request
        if: steps.check_token.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.OVERLAY_GITHUB_TOKEN }}
        run: |
          cd arrans_overlay
          VERSION="${GITHUB_REF#refs/tags/v}"
          BRANCH_NAME="update-kllamabooks-${VERSION}"

          git checkout -b $BRANCH_NAME
          git add dev-vcs/kllamabooks/

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: update kllamabooks to ${VERSION}"
            git push origin $BRANCH_NAME

            gh pr create \
              --title "feat: update kllamabooks to ${VERSION}" \
              --body "Automated update of kllamabooks ebuild for version ${VERSION}." \
              --base main \
              --head $BRANCH_NAME
          fi
