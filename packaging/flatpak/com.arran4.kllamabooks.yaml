app-id: com.arran4.kllamabooks
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: kllamabooks
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=session-bus
modules:
  - name: sqlcipher
    buildsystem: autotools
    config-opts:
      - --enable-tempstore=yes
      - --disable-tcl
      - CPPFLAGS=-DSQLITE_HAS_CODEC
      - LIBS=-lcrypto
    sources:
      - type: archive
        url: https://github.com/sqlcipher/sqlcipher/archive/v4.5.5.tar.gz
        sha256: 014ef9d4f5b5f4e7af4d93ad399667947bb55e31860e671f0def1b8ae6f05de0
  - name: kllamabooks
    buildsystem: cmake
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../../
        skip: [ "build", ".flatpak-builder", ".git", "packaging" ]
